# NOTE: This service was created via the Render dashboard, not as a Blueprint.
# render.yaml is NOT authoritative for routes/redirects on this service — those
# are managed in the Render dashboard (Static Site → Redirects/Rewrites).
# Edits to the routes/redirects blocks here will deploy but will NOT affect
# live routing. Update via the dashboard instead.
services:
  # Frontend — React SPA (Vite static build)
  - type: web
    runtime: static
    name: baxterlabs-static-site
    repo: https://github.com/baxterlabsai/baxterlabs-static-site
    branch: main
    buildCommand: npm run build
    staticPublishPath: ./dist
    plan: starter
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    redirects:
      - source: /index.html
        destination: /
        type: 301
