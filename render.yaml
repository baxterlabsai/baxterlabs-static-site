services:
  # Frontend — React SPA (Vite static build)
  - type: web
    runtime: static
    name: baxterlabs-static-site
    repo: https://github.com/baxterlabsai/baxterlabs-static-site
    branch: main
    buildCommand: npm run build
    staticPublishPath: ./dist
    plan: starter
    redirects:
      - source: /index.html
        destination: /
        type: 301

  # Backend — FastAPI API (Docker for LibreOffice headless)
  - type: web
    runtime: docker
    name: baxterlabs-api
    repo: https://github.com/baxterlabsai/baxterlabs-static-site
    branch: main
    dockerfilePath: backend/Dockerfile
    plan: starter
    region: oregon
